name: Build new-api

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  GOFLAGS: -buildvcs=false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build new-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set version
        id: version
        run: |
          VERSION="$(git rev-parse --short HEAD)"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Frontend (default)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
          DISABLE_ESLINT_PLUGIN: "true"
          VITE_REACT_APP_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          cd web/default
          bun install
          bun run build

      - name: Build Frontend (classic)
        env:
          CI: ""
          VITE_REACT_APP_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          cd web/classic
          bun install
          bun run build

      - name: Build Backend (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: 13.2
          copyback: true
          prepare: |
            set -e
            pkg update -f || true
            pkg install -y \
              jq \
              wget \
              curl \
              git \
              gcc \
              bash \
              gawk \
              gsed

            wget https://dl.google.com/go/go1.25.6.freebsd-amd64.tar.gz
            tar -C /usr/local -xzf go1.25.6.freebsd-amd64.tar.gz
            rm -f go1.25.6.freebsd-amd64.tar.gz
            ln -sf /usr/local/go/bin/go /usr/local/bin/go

          run: |
            set -e
            cd "$GITHUB_WORKSPACE"
            go version
            go mod download
            go build \
              -buildvcs=false \
              -ldflags "-s -w -X github.com/QuantumNous/new-api/common.Version=${{ steps.version.outputs.tag }} -extldflags '-static'" \
              -o new-api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: new-api

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ steps.version.outputs.tag }}
          files: new-api
          generate_release_notes: true

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
