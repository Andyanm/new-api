name: Build new-api

on:
  workflow_dispatch

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build new-api

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set version
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Frontend (default)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web/default
          bun install
          DISABLE_ESLINT_PLUGIN=true \
          VITE_REACT_APP_VERSION="${{ steps.version.outputs.tag }}" \
          bun run build
          cd ../../

      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd web/classic
          bun install
          VITE_REACT_APP_VERSION="${{ steps.version.outputs.tag }}" \
          bun run build
          cd ../../

      - name: Build Backend (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          # 关键修复：升级至 14.1 确保 pkg 软件源向后兼容性，彻底解决版本冲突崩溃
          release: 14.1

          prepare: |
            pkg update -y
            pkg install -y \
              jq \
              wget \
              curl \
              git \
              gcc \
              bash \
              gawk \
              gsed

            # 下载并配置适用于 FreeBSD 的 Go 1.25.6 编译器
            wget https://dl.google.com/go/go1.25.6.freebsd-amd64.tar.gz
            tar -C /usr/local -xzf go1.25.6.freebsd-amd64.tar.gz
            rm go1.25.6.freebsd-amd64.tar.gz
            ln -sf /usr/local/go/bin/go /usr/local/bin/go

          run: |
            # 动态注册安全的 Git 工作目录，防止虚拟机内 Git 权限报错
            git config --global --add safe.directory "${{ github.workspace }}"

            go version
            go mod download

            # 静态编译：将前端打包后的静态资源隐式包含（通过 Go 1.16+ embed 机制），并注入版本号
            go build \
              -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${{ steps.version.outputs.tag }}' -extldflags '-static'" \
              -o new-api

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: |
            new-api

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ steps.version.outputs.tag }}
          files: |
            new-api
          generate_release_notes: true

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
