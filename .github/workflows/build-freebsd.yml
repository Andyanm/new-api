name: Build new-api

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  UPSTREAM_REPO: QuantumNous/new-api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # Resolve upstream tag (safe version)
      # -----------------------
      - name: Resolve upstream tag
        id: upstream
        run: |
          tag=$(curl -fsSL https://api.github.com/repos/${UPSTREAM_REPO}/tags \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['name'] if d else '')")

          if [ -z "$tag" ]; then
            echo "tag=main" >> $GITHUB_OUTPUT
          else
            echo "tag=$tag" >> $GITHUB_OUTPUT
          fi

      # -----------------------
      # Clone upstream
      # -----------------------
      - name: Clone Repo
        run: |
          git clone --depth 1 \
            --branch "${{ steps.upstream.outputs.tag }}" \
            https://github.com/${UPSTREAM_REPO}.git new-api

      # -----------------------
      # Frontend build
      # -----------------------
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Frontend (default)
        run: |
          cd new-api/web/default
          bun install
          bun run build

      - name: Build Frontend (classic)
        run: |
          cd new-api/web/classic
          bun install
          bun run build

      # -----------------------
      # Backend FreeBSD build
      # -----------------------
      - name: Build Backend (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: 13.2

          prepare: |
            pkg update -f || true

            pkg install -y \
              jq wget curl git gcc bash gawk gsed

            wget https://dl.google.com/go/go1.25.6.freebsd-amd64.tar.gz
            tar -C /usr/local -xzf go1.25.6.freebsd-amd64.tar.gz
            rm go1.25.6.freebsd-amd64.tar.gz
            ln -sf /usr/local/go/bin/go /usr/local/bin/go

          run: |
            cd new-api

            go mod download

            go build \
              -ldflags "-s -w \
              -X github.com/QuantumNous/new-api/common.Version=${{ steps.upstream.outputs.tag }} \
              -extldflags '-static'" \
              -o new-api

      # -----------------------
      # Upload
      # -----------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: new-api/new-api

      # -----------------------
      # Release
      # -----------------------
      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ steps.upstream.outputs.tag }}
          files: new-api/new-api
          generate_release_notes: true

      # -----------------------
      # Cleanup
      # -----------------------
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
